
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order</title>
</head>
<body>
    <h1>Order</h1>
    <form id="order-form">
        </select>
        <div id="menu-items-selection"></div>
        <label for="order-type">Order Type:</label>
        <select id="order-type" name="order-type">
            <option value="takeaway">Takeaway</option>
            <option value="dining">Dining</option>
        </select>
        <button type="submit">Place Order</button>
    </form>

    <script>
        fetch('/api/menu')
            .then(response => response.json())
            .then(data => {
                const menuItemsSelection = document.getElementById('menu-items-selection');
                data.forEach(item => {
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.name = 'menu-items';
                    checkbox.value = item.id;
                    const label = document.createElement('label');
                    label.innerHTML = `${item.name} - $${item.price}`;
                    menuItemsSelection.appendChild(checkbox);
                    menuItemsSelection.appendChild(label);
                    menuItemsSelection.appendChild(document.createElement('br'));
                });
            });

        document.getElementById('order-form').addEventListener('submit', (event) => {
            event.preventDefault();

            const selectedItems = Array.from(document.querySelectorAll('input[name="menu-items"]:checked'))
                .map(item => ({ id: item.value }));

            const order = {
                items: selectedItems,
                orderType: document.getElementById('order-type').value
            };

            fetch('/api/orders', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(order)
            })
                .then(response => response.json())
                .then(data => {
                    console.log('Order placed:', data);
                    alert('Order placed successfully!');
                });
        });
    </script>
</body>
</html>
