
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Daily Deliveries</title>
</head>
<body>
    <h1>Daily Deliveries</h1>
    <table>
        <thead>
            <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Pizza</th>
                <th>Time</th>
                <th>Rider</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="delivery : ${deliveries}">
                <td th:text="${delivery.order.id}"></td>
                <td th:text="${delivery.order.user.name}"></td>
                <td th:text="${delivery.order.menuItem.name}"></td>
                <td th:text="${delivery.deliveryTime}"></td>
                <td th:text="${delivery.rider}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
