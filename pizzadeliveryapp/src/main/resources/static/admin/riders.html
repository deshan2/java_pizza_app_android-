
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Rider Details</title>
</head>
<body>
    <h1>Rider Details</h1>
    <table>
        <thead>
            <tr>
                <th>Rider ID</th>
                <th>Name</th>
                <th>Contact</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="rider : ${riders}">
                <td th:text="${rider.id}"></td>
                <td th:text="${rider.name}"></td>
                <td th:text="${rider.contact}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
